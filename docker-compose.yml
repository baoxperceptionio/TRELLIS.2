services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VERSION: "${TORCH_VERSION:-2.5.1}"
        TORCHVISION_VERSION: "${TORCHVISION_VERSION:-0.20.1}"
        INSTALL_FLASH_ATTN: "${INSTALL_FLASH_ATTN:-0}"
        INSTALL_NVDIFFRAST: "${INSTALL_NVDIFFRAST:-0}"
        INSTALL_NVDIFFREC: "${INSTALL_NVDIFFREC:-0}"
        INSTALL_CUMESH: "${INSTALL_CUMESH:-0}"
        INSTALL_FLEXGEMM: "${INSTALL_FLEXGEMM:-0}"
        INSTALL_OVOXEL: "${INSTALL_OVOXEL:-0}"
    image: trellis2:cuda-12.8-gh200
    working_dir: /workspace
    volumes:
      - .:/workspace
      - hf-cache:/root/.cache/huggingface
      - torch-cache:/root/.cache/torch
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CUDA_HOME: /usr/local/cuda
      OPENCV_IO_ENABLE_OPENEXR: "1"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      PYTHONUNBUFFERED: "1"
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "7860:7860"
    shm_size: "16gb"
    ipc: host
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: bash

volumes:
  hf-cache:
  torch-cache:
